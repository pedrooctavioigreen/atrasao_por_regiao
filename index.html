<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clientes com atraso acima de 180 dias</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #f5f5f5;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 24px;
  }

  /* HEADER */
  .header {
    margin-bottom: 20px;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 700;
    color: #1a1a1a;
    line-height: 1.3;
  }
  .header .meta {
    font-size: 12px;
    color: #666;
    margin-top: 4px;
  }
  .header .meta span {
    display: inline-block;
    background: #501313;
    color: #fff;
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 600;
    margin-right: 8px;
  }

  /* LAYOUT */
  #container {
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  #map-wrap {
    flex: 1 1 60%;
    min-width: 0;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    padding: 16px;
    position: relative;
  }
  #panel {
    flex: 0 0 300px;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    padding: 14px;
    max-height: 720px;
    overflow-y: auto;
  }

  /* PANEL HEADER */
  .panel-title {
    font-size: 14px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 2px;
  }
  .panel-sub {
    font-size: 11px;
    color: #888;
    border-bottom: 1px solid #eee;
    padding-bottom: 10px;
    margin-bottom: 10px;
  }

  /* FILTRO */
  .filter-wrap {
    margin-bottom: 12px;
  }
  .filter-wrap label {
    font-size: 11px;
    color: #666;
    display: block;
    margin-bottom: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .filter-wrap select {
    width: 100%;
    padding: 6px 8px;
    font-size: 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    background: #fafafa;
    color: #1a1a1a;
    cursor: pointer;
    outline: none;
  }
  .filter-wrap select:focus {
    border-color: #a32d2d;
  }

  /* DIST ROWS */
  .dist-row {
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid #f0f0f0;
  }
  .dist-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .dist-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 3px;
  }
  .dist-name {
    font-size: 12px;
    font-weight: 600;
    color: #1a1a1a;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 200px;
  }
  .dist-uf {
    font-weight: 400;
    color: #888;
    font-size: 11px;
  }
  .dist-pct {
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    margin-left: 6px;
  }
  .bar-bg {
    background: #f0f0f0;
    border-radius: 3px;
    height: 5px;
    width: 100%;
    margin-bottom: 5px;
  }
  .bar-fill { height: 5px; border-radius: 3px; }
  .dist-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px 8px;
    font-size: 11px;
    color: #888;
  }
  .dist-stats b { font-weight: 600; color: #1a1a1a; }

  /* TOOLTIP */
  #tooltip {
    position: fixed;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 12px;
    pointer-events: none;
    display: none;
    z-index: 1000;
    min-width: 250px;
    max-width: 300px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  }
  .tt-title {
    font-weight: 700;
    font-size: 13px;
    color: #1a1a1a;
    margin-bottom: 8px;
  }
  .tt-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 3px 10px;
    font-size: 12px;
    margin-bottom: 8px;
  }
  .tt-label { color: #888; white-space: nowrap; }
  .tt-val { text-align: right; font-weight: 600; color: #1a1a1a; }
  .tt-val.alert { color: #a32d2d; }
  .tt-divider {
    grid-column: 1/-1;
    border-top: 1px solid #eee;
    margin: 4px 0;
  }
  .tt-dist-title {
    font-size: 10px;
    color: #888;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 5px;
  }
  .tt-dist-row {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    font-size: 11px;
    margin-bottom: 3px;
    align-items: baseline;
  }
  .tt-dist-row .dn { color: #555; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 120px; }
  .tt-dist-row .dv { font-weight: 600; flex-shrink: 0; white-space: nowrap; }

  /* LEGENDA */
  #legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    padding: 8px 0 0;
    font-size: 11px;
    color: #666;
    margin-top: 4px;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-swatch {
    width: 12px; height: 12px;
    border-radius: 2px;
    border: 1px solid rgba(0,0,0,0.1);
    display: inline-block;
    flex-shrink: 0;
  }

  /* MAP TITLE */
  .map-title {
    font-size: 12px;
    color: #888;
    margin-bottom: 8px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Clientes com atraso acima de 180 dias &mdash; Relação por região</h1>
  <div class="meta">
    <span>Extração: 22/06/2026</span>
    Atraso &gt; 180 dias · Percentual de clientes sem boleto por estado e distribuidora
  </div>
</div>

<div id="container">
  <div id="map-wrap">
    <div class="map-title">% clientes sem boleto por estado</div>
    <div id="map"></div>
    <div id="legend"></div>
  </div>
  <div id="panel">
    <div class="panel-title">% em atraso por distribuidora</div>
    <div class="panel-sub">Ordenado por % s/ boleto · distribuidoras consolidadas</div>
    <div class="filter-wrap">
      <label>Filtrar por estado</label>
      <select id="state-filter">
        <option value="ALL">Todos os estados</option>
      </select>
    </div>
    <div id="dist-list"></div>
  </div>
</div>

<div id="tooltip"></div>

<script>
const raw = [
  {uf:"MG", dist:"CEMIG-D",            clientes:101526, semBoleto:1016,  kwh:27445107, kwhSem:299191},
  {uf:"GO", dist:"EQUATORIAL",          clientes:19383,  semBoleto:2624,  kwh:6311318,  kwhSem:722509},
  {uf:"ES", dist:"EDP",                 clientes:7641,   semBoleto:3041,  kwh:4734991,  kwhSem:1401109},
  {uf:"MT", dist:"ENERGISA",            clientes:7592,   semBoleto:823,   kwh:3094947,  kwhSem:261422},
  {uf:"PA", dist:"EQUATORIAL PA",       clientes:7412,   semBoleto:5391,  kwh:2514820,  kwhSem:1944082},
  {uf:"RJ", dist:"ENEL",                clientes:7157,   semBoleto:3020,  kwh:2782379,  kwhSem:1159964},
  {uf:"RS", dist:"CEEE",                clientes:6408,   semBoleto:1388,  kwh:3671517,  kwhSem:573050},
  {uf:"RS", dist:"RGE",                 clientes:6327,   semBoleto:3084,  kwh:2034442,  kwhSem:738998},
  {uf:"BA", dist:"COELBA",              clientes:5631,   semBoleto:1602,  kwh:1442714,  kwhSem:505301},
  {uf:"SP", dist:"CPFL",                clientes:5499,   semBoleto:2719,  kwh:1990078,  kwhSem:902424},
  {uf:"SC", dist:"CELESC",              clientes:5012,   semBoleto:1274,  kwh:3176842,  kwhSem:423057},
  {uf:"PR", dist:"COPEL",               clientes:4252,   semBoleto:1206,  kwh:1669537,  kwhSem:479091},
  {uf:"PI", dist:"EQUATORIAL",          clientes:3833,   semBoleto:945,   kwh:1026937,  kwhSem:251820},
  {uf:"RN", dist:"COSERN",              clientes:3766,   semBoleto:2228,  kwh:866986,   kwhSem:530809},
  {uf:"TO", dist:"ENERGISA TOCANTINS",  clientes:3104,   semBoleto:2225,  kwh:1049204,  kwhSem:752655},
  {uf:"MA", dist:"EQUATORIAL",          clientes:3054,   semBoleto:2108,  kwh:1184183,  kwhSem:889769},
  {uf:"AL", dist:"EQUATORIAL",          clientes:2818,   semBoleto:1009,  kwh:884353,   kwhSem:308509},
  {uf:"MS", dist:"ENERGISA",            clientes:2532,   semBoleto:211,   kwh:939816,   kwhSem:64285},
  {uf:"PE", dist:"NEO ENERGIA",         clientes:2204,   semBoleto:134,   kwh:667151,   kwhSem:30409},
  {uf:"PB", dist:"ENERGISA PB",         clientes:1956,   semBoleto:757,   kwh:628108,   kwhSem:212242},
  {uf:"SP", dist:"CPFL PIRATININGA",    clientes:1901,   semBoleto:773,   kwh:962744,   kwhSem:330239},
  {uf:"CE", dist:"ENEL",                clientes:1774,   semBoleto:194,   kwh:550326,   kwhSem:49698},
  {uf:"SP", dist:"CPFL SANTA CRUZ",     clientes:1731,   semBoleto:1541,  kwh:899734,   kwhSem:615465},
  {uf:"MG", dist:"ENERGISA MINAS RIO",  clientes:1591,   semBoleto:109,   kwh:461122,   kwhSem:40881},
  {uf:"SP", dist:"ENERGISA SUL SUDESTE",clientes:1435,   semBoleto:1117,  kwh:501305,   kwhSem:394926},
  {uf:"SP", dist:"ELEKTRO",             clientes:1404,   semBoleto:472,   kwh:711021,   kwhSem:159352},
  {uf:"SP", dist:"EDP",                 clientes:1081,   semBoleto:400,   kwh:593027,   kwhSem:352035},
  {uf:"SP", dist:"ENERGISA",            clientes:718,    semBoleto:28,    kwh:472237,   kwhSem:9680},
  {uf:"PR", dist:"CPFL SANTA CRUZ",     clientes:614,    semBoleto:602,   kwh:160911,   kwhSem:158521},
  {uf:"SE", dist:"ENERGISA",            clientes:509,    semBoleto:486,   kwh:213103,   kwhSem:197806},
  {uf:"RJ", dist:"LIGHT",               clientes:337,    semBoleto:285,   kwh:269398,   kwhSem:238015},
  {uf:"RJ", dist:"ENERGISA MINAS RIO",  clientes:232,    semBoleto:12,    kwh:63701,    kwhSem:4224},
  {uf:"MG", dist:"ENERGISA SUL SUDESTE",clientes:36,     semBoleto:30,    kwh:12266,    kwhSem:8737},
  {uf:"PA", dist:"EQUATORIAL",          clientes:29,     semBoleto:22,    kwh:10295,    kwhSem:9029},
  {uf:"MS", dist:"ELEKTRO",             clientes:18,     semBoleto:17,    kwh:8315,     kwhSem:7734},
  {uf:"SC", dist:"COPEL",               clientes:6,      semBoleto:2,     kwh:1899,     kwhSem:417},
  {uf:"SP", dist:"ENEL",                clientes:10,     semBoleto:10,    kwh:2145,     kwhSem:2145},
  {uf:"PR", dist:"CELESC",              clientes:1,      semBoleto:1,     kwh:246,      kwhSem:246},
  {uf:"PR", dist:"CPFL",                clientes:1,      semBoleto:1,     kwh:160,      kwhSem:160},
  {uf:"PR", dist:"ENERGISA SUL SUDESTE",clientes:1,      semBoleto:1,     kwh:311,      kwhSem:311},
  {uf:"GO", dist:"ENEL",                clientes:1,      semBoleto:0,     kwh:336,      kwhSem:0},
  {uf:"RJ", dist:"ENEL",                clientes:1,      semBoleto:0,     kwh:101,      kwhSem:0},
];

const stateNameMap = {
  "Acre":"AC","Alagoas":"AL","Amapá":"AP","Amazonas":"AM","Bahia":"BA",
  "Ceará":"CE","Distrito Federal":"DF","Espírito Santo":"ES","Goiás":"GO",
  "Maranhão":"MA","Mato Grosso":"MT","Mato Grosso do Sul":"MS","Minas Gerais":"MG",
  "Pará":"PA","Paraíba":"PB","Paraná":"PR","Pernambuco":"PE","Piauí":"PI",
  "Rio de Janeiro":"RJ","Rio Grande do Norte":"RN","Rio Grande do Sul":"RS",
  "Rondônia":"RO","Roraima":"RR","Santa Catarina":"SC","São Paulo":"SP",
  "Sergipe":"SE","Tocantins":"TO"
};
const ufToName = Object.fromEntries(Object.entries(stateNameMap).map(([k,v])=>[v,k]));

// Consolidar por UF+distribuidora
const distAgg = {};
for (const r of raw) {
  const key = `${r.uf}|${r.dist.trim().toUpperCase().replace(/\s+/g,' ')}`;
  if (!distAgg[key]) distAgg[key] = {uf:r.uf, dist:r.dist.trim().toUpperCase().replace(/\s+/g,' '), clientes:0, semBoleto:0, kwh:0, kwhSem:0};
  const a = distAgg[key];
  a.clientes+=r.clientes; a.semBoleto+=r.semBoleto; a.kwh+=r.kwh; a.kwhSem+=r.kwhSem;
}

// Agregar por estado
const stateTotals = {};
for (const a of Object.values(distAgg)) {
  if (!stateTotals[a.uf]) stateTotals[a.uf] = {total:0,sem:0,kwh:0,kwhSem:0,dists:[]};
  const s = stateTotals[a.uf];
  s.total+=a.clientes; s.sem+=a.semBoleto; s.kwh+=a.kwh; s.kwhSem+=a.kwhSem;
  s.dists.push(a);
}
for (const uf in stateTotals) {
  const s = stateTotals[uf];
  s.pct = s.total > 0 ? s.sem/s.total : 0;
}

const colorRamp = ["#fcebeb","#f7c1c1","#f09595","#e24b4a","#a32d2d","#791f1f","#501313"];
const maxPct = Math.max(...Object.values(stateTotals).map(d=>d.pct));
const colorScale = d3.scaleQuantize([0, maxPct], colorRamp);

function barColor(pct) {
  if (pct >= 0.6) return "#791f1f";
  if (pct >= 0.4) return "#a32d2d";
  if (pct >= 0.2) return "#e24b4a";
  return "#f09595";
}
function fmtN(v) { return v.toLocaleString('pt-BR'); }
function fmtKwh(v) {
  if (v >= 1000000) return (v/1000000).toFixed(1) + ' GWh';
  if (v >= 1000) return Math.round(v/1000).toLocaleString('pt-BR') + ' MWh';
  return v.toLocaleString('pt-BR') + ' kWh';
}

// Popula filtro de estados
const stateFilter = document.getElementById('state-filter');
const ufsPresentes = Object.keys(stateTotals).sort((a,b) => {
  const na = ufToName[a] || a;
  const nb = ufToName[b] || b;
  return na.localeCompare(nb, 'pt-BR');
});
for (const uf of ufsPresentes) {
  const opt = document.createElement('option');
  opt.value = uf;
  opt.textContent = `${ufToName[uf] || uf} (${uf})`;
  stateFilter.appendChild(opt);
}

// Renderiza quadrante
const allDists = Object.values(distAgg)
  .map(d => ({...d, pct: d.clientes > 0 ? d.semBoleto/d.clientes : 0}))
  .sort((a,b) => b.pct - a.pct);

function renderPanel(filterUF) {
  const list = filterUF === 'ALL' ? allDists : allDists.filter(d => d.uf === filterUF);
  const maxDistPct = list.length > 0 ? list[0].pct : 1;
  document.getElementById('dist-list').innerHTML = list.map(d => `
    <div class="dist-row">
      <div class="dist-header">
        <span class="dist-name" title="${d.dist} (${d.uf})">${d.dist} <span class="dist-uf">(${d.uf})</span></span>
        <span class="dist-pct" style="color:${d.pct>=0.5?'#a32d2d':'#555'};">${Math.round(d.pct*100)}%</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(d.pct/maxDistPct*100)}%;background:${barColor(d.pct)};"></div></div>
      <div class="dist-stats">
        <span>Total: <b>${fmtN(d.clientes)}</b> cli.</span>
        <span>S/ boleto: <b style="color:${d.pct>=0.5?'#a32d2d':'#1a1a1a'};">${fmtN(d.semBoleto)}</b></span>
        <span>kWh total: <b>${fmtKwh(d.kwh)}</b></span>
        <span>kWh s/ bol.: <b style="color:${d.pct>=0.5?'#a32d2d':'#1a1a1a'};">${fmtKwh(d.kwhSem)}</b></span>
      </div>
    </div>`).join('') || '<p style="font-size:12px;color:#888;text-align:center;padding:16px 0;">Nenhuma distribuidora encontrada.</p>';
}

renderPanel('ALL');
stateFilter.addEventListener('change', () => renderPanel(stateFilter.value));

// Mapa
const tooltip = document.getElementById('tooltip');
const svg = d3.select('#map').append('svg').attr('viewBox','0 0 700 530').attr('width','100%');
const projection = d3.geoMercator().center([-54,-15]).scale(660).translate([350,265]);
const path = d3.geoPath(projection);

d3.json('https://cdn.jsdelivr.net/npm/datamaps@0.5.10/src/js/data/bra.topo.json').then(bra => {
  const features = topojson.feature(bra, bra.objects.bra).features;

  svg.selectAll('path').data(features).join('path')
    .attr('d', path)
    .attr('stroke', '#fff')
    .attr('stroke-width', 0.7)
    .attr('fill', d => {
      const uf = stateNameMap[d.properties.name];
      const data = uf ? stateTotals[uf] : null;
      return data ? colorScale(data.pct) : '#d3d1c7';
    })
    .style('cursor', d => stateTotals[stateNameMap[d.properties.name]] ? 'pointer' : 'default')
    .on('mousemove', function(event, d) {
      const uf = stateNameMap[d.properties.name];
      const data = uf ? stateTotals[uf] : null;
      if (!data) return;

      const topDists = [...data.dists]
        .sort((a,b) => (b.semBoleto/b.clientes) - (a.semBoleto/a.clientes))
        .slice(0, 5);

      const distRows = topDists.map(x => {
        const p = x.clientes > 0 ? Math.round(x.semBoleto/x.clientes*100) : 0;
        return `<div class="tt-dist-row">
          <span class="dn">${x.dist}</span>
          <span class="dv" style="color:${p>=50?'#a32d2d':'#1a1a1a'};">${p}% &middot; ${fmtKwh(x.kwhSem)} / ${fmtKwh(x.kwh)}</span>
        </div>`;
      }).join('');

      tooltip.innerHTML = `
        <div class="tt-title">${d.properties.name} (${uf})</div>
        <div class="tt-grid">
          <span class="tt-label">Total kWh</span><span class="tt-val">${fmtKwh(data.kwh)}</span>
          <span class="tt-label">kWh s/ boleto</span><span class="tt-val alert">${fmtKwh(data.kwhSem)} (${Math.round(data.pct*100)}%)</span>
        </div>
        <div class="tt-dist-title">Distribuidoras — por % atraso</div>
        ${distRows}`;

      tooltip.style.display = 'block';
      const x = event.clientX + 16;
      const y = event.clientY - 10;
      const tw = 260;
      tooltip.style.left = (x + tw > window.innerWidth ? event.clientX - tw - 10 : x) + 'px';
      tooltip.style.top = Math.max(8, y) + 'px';
    })
    .on('mouseleave', () => { tooltip.style.display='none'; })
    .on('click', function(event, d) {
      const uf = stateNameMap[d.properties.name];
      if (!uf || !stateTotals[uf]) return;
      stateFilter.value = uf;
      renderPanel(uf);
      document.getElementById('panel').scrollTop = 0;
    });

  svg.selectAll('text').data(features).join('text')
    .attr('transform', d => `translate(${path.centroid(d)})`)
    .attr('text-anchor','middle').attr('dy','0.35em')
    .attr('font-size', 9).attr('font-weight','700')
    .attr('fill', d => {
      const uf = stateNameMap[d.properties.name];
      const data = uf ? stateTotals[uf] : null;
      if (!data) return '#aaa';
      return data.pct > maxPct*0.5 ? '#fff' : '#791f1f';
    })
    .attr('pointer-events','none')
    .attr('font-family','Arial,Helvetica,sans-serif')
    .text(d => stateNameMap[d.properties.name] || '');

  // Legenda
  const legendEl = document.getElementById('legend');
  legendEl.innerHTML = '<span style="margin-right:6px;color:#666;font-size:11px;">% s/ boleto:</span>' +
    colorRamp.map((c,i) => {
      const lo = Math.round(maxPct * i/colorRamp.length*100);
      const hi = i===colorRamp.length-1 ? Math.round(maxPct*100) : Math.round(maxPct*(i+1)/colorRamp.length*100);
      return `<span class="legend-item"><span class="legend-swatch" style="background:${c};"></span><span style="font-size:11px;color:#666;">${lo}–${hi}%</span></span>`;
    }).join('');
});
</script>
</body>
</html>
